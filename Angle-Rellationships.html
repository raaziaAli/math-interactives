<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transversal & Angle Relationships</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2e;--surface:#13243d;--surface2:#1a3050;--card:#1e3a5f;
  --teal:#00d4aa;--blue:#4a9eff;--amber:#ffb347;--coral:#ff6b6b;
  --purple:#c084fc;--green:#4ade80;--pink:#f472b6;
  --text:#e8f4ff;--muted:#7a9cc0;--faint:#3a5878;--border:rgba(255,255,255,.08);
}
html{font-size:15px}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 14px rgba(0,212,170,.3)}
.brand-name{font-size:17px;font-weight:900;color:var(--text)}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px}
.back-btn{padding:8px 18px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;text-decoration:none;transition:all .15s}
.back-btn:hover{border-color:var(--teal);color:var(--teal)}

/* Layout */
.app{display:grid;grid-template-columns:1fr 340px;flex:1;gap:0}
.canvas-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:20px}
.panel-col{background:var(--surface);border-left:1px solid var(--border);padding:24px 20px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}

/* Canvas wrapper */
.cv-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.3);width:100%;max-width:720px}
#cv{display:block;width:100%;height:auto}

/* Slider */
.slider-row{display:flex;align-items:center;gap:14px;width:100%;max-width:720px}
.slider-row label{font-size:12px;font-weight:800;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.slider-row input[type=range]{flex:1;accent-color:var(--teal);cursor:pointer;height:6px}
.slider-val{font-size:16px;font-weight:900;color:var(--teal);font-family:'Nunito',sans-serif;min-width:44px;text-align:right}

/* Toggle */
.toggle-row{display:flex;align-items:center;gap:10px;width:100%;max-width:720px}
.toggle-row label{font-size:13px;font-weight:700;color:var(--muted);cursor:pointer}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--faint);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;padding:0}
.toggle.on{background:var(--teal)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:23px}

/* Panel sections */
.section-title{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.section-title::before{content:'';width:20px;height:2px;background:var(--teal);border-radius:1px}

/* Category buttons */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-btn{
  padding:12px 10px;border-radius:12px;border:2px solid var(--border);
  background:rgba(255,255,255,.04);cursor:pointer;transition:all .2s;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  color:var(--muted);text-align:center;line-height:1.3;
}
.cat-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.cat-btn.active{color:#fff;border-color:transparent}

/* Info panel */
.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.info-type{font-size:13px;font-weight:900;color:var(--text);margin-bottom:4px}
.info-pair{font-size:18px;font-weight:900;color:var(--teal);font-family:'Nunito',sans-serif;margin-bottom:8px}
.info-rule{font-size:12px;color:var(--muted);line-height:1.65}
.info-rule span{font-weight:800}
.info-relation{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:6px 12px;border-radius:99px;font-size:11px;font-weight:800}
.rel-equal{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.rel-supp{background:rgba(255,179,71,.12);color:var(--amber);border:1px solid rgba(255,179,71,.2)}

/* Navigation dots */
.nav-dots{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.ndot{width:8px;height:8px;border-radius:50%;background:var(--faint);cursor:pointer;transition:all .2s}
.ndot.active{background:var(--teal);transform:scale(1.3)}
.prev-next{display:flex;gap:8px;justify-content:center}
.pn-btn{padding:8px 20px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s}
.pn-btn:hover{border-color:var(--teal);color:var(--teal)}

/* Angle labels reference */
.angle-ref{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px}
.ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.ref-item{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--muted)}
.ref-dot{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}

@media(max-width:900px){.app{grid-template-columns:1fr}.panel-col{border-left:none;border-top:1px solid var(--border)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="brand-icon">📐</div>
    <div>
      <div class="brand-name">Transversal & Angle Relationships</div>
      <div class="brand-sub">Parallel lines cut by a transversal · Grade 8 · 8.G</div>
    </div>
  </div>
  <a class="back-btn" href="index.html">← Back to portal</a>
</div>

<div class="app">

  <!-- Canvas -->
  <div class="canvas-col">
    <canvas id="cv" width="720" height="400"></canvas>

    <div class="slider-row">
      <label>Transversal angle</label>
      <input type="range" id="angleSlider" min="15" max="75" value="40" oninput="setAngle(this.value)">
      <span class="slider-val" id="angleVal">40°</span>
    </div>

    <div class="toggle-row">
      <button class="toggle on" id="parallelToggle" onclick="toggleParallel()"></button>
      <label onclick="toggleParallel()" style="cursor:pointer">Parallel lines (corresponding & alternate angles are congruent)</label>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel-col">

    <div>
      <div class="section-title">Angle Pair Category</div>
      <div class="cat-grid">
        <button class="cat-btn" id="btn-vertical" onclick="selectCat('vertical')" style="--c:#c084fc">
          <div style="font-size:18px;margin-bottom:4px">↕</div>
          Vertical Angles
        </button>
        <button class="cat-btn" id="btn-corresponding" onclick="selectCat('corresponding')" style="--c:#4a9eff">
          <div style="font-size:18px;margin-bottom:4px">⇒</div>
          Corresponding
        </button>
        <button class="cat-btn" id="btn-altInterior" onclick="selectCat('altInterior')" style="--c:#00d4aa">
          <div style="font-size:18px;margin-bottom:4px">↔</div>
          Alt. Interior
        </button>
        <button class="cat-btn" id="btn-altExterior" onclick="selectCat('altExterior')" style="--c:#ffb347">
          <div style="font-size:18px;margin-bottom:4px">⟺</div>
          Alt. Exterior
        </button>
        <button class="cat-btn" id="btn-coInterior" onclick="selectCat('coInterior')" style="--c:#f472b6" style="grid-column:span 2">
          <div style="font-size:18px;margin-bottom:4px">∥</div>
          Co-interior
        </button>
        <button class="cat-btn" id="btn-clear" onclick="clearCat()" style="background:rgba(255,82,82,.08);border-color:rgba(255,82,82,.2);color:#ff8888">
          <div style="font-size:18px;margin-bottom:4px">✕</div>
          Clear
        </button>
      </div>
    </div>

    <!-- Info card -->
    <div class="info-card" id="info-card">
      <div class="info-type" id="info-type">Select a category</div>
      <div class="info-pair" id="info-pair">—</div>
      <div class="info-rule" id="info-rule">Click any angle pair category above to highlight and explore that relationship on the diagram.</div>
    </div>

    <!-- Pair navigation -->
    <div id="nav-area" style="display:none">
      <div class="nav-dots" id="nav-dots"></div>
      <div class="prev-next" style="margin-top:8px">
        <button class="pn-btn" onclick="prevPair()">← Prev pair</button>
        <button class="pn-btn" onclick="nextPair()">Next pair →</button>
      </div>
    </div>

    <!-- Angle reference -->
    <div class="angle-ref">
      <div class="section-title">Angle Labels</div>
      <div class="ref-grid" id="ref-grid"></div>
    </div>

  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// State
let angle = 40;
let isParallel = true;
let activeCat = null;
let pairIndex = 0;

// Color palette per category
const CAT_COLORS = {
  vertical:   '#c084fc',
  corresponding: '#4a9eff',
  altInterior:'#00d4aa',
  altExterior:'#ffb347',
  coInterior: '#f472b6',
};

const CAT_INFO = {
  vertical: {
    name: 'Vertical Angles',
    rule: 'Vertical angles are formed opposite each other when two lines intersect. They are <span>always equal</span>, regardless of whether lines are parallel.',
    relation: 'equal',
    pairs: [['∠1','∠3'],['∠2','∠4'],['∠5','∠7'],['∠6','∠8']]
  },
  corresponding: {
    name: 'Corresponding Angles',
    rule: 'Corresponding angles are in the same position at each intersection. When lines are parallel, they are <span>equal (congruent)</span>.',
    relation: 'equal',
    pairs: [['∠1','∠5'],['∠2','∠6'],['∠3','∠7'],['∠4','∠8']]
  },
  altInterior: {
    name: 'Alternate Interior Angles',
    rule: 'Alternate interior angles are between the parallel lines, on opposite sides of the transversal. When lines are parallel, they are <span>equal (congruent)</span>.',
    relation: 'equal',
    pairs: [['∠3','∠6'],['∠4','∠5']]
  },
  altExterior: {
    name: 'Alternate Exterior Angles',
    rule: 'Alternate exterior angles are outside the parallel lines, on opposite sides of the transversal. When lines are parallel, they are <span>equal (congruent)</span>.',
    relation: 'equal',
    pairs: [['∠1','∠8'],['∠2','∠7']]
  },
  coInterior: {
    name: 'Co-interior (Same-side Interior)',
    rule: 'Co-interior angles are between the parallel lines, on the <span>same side</span> of the transversal. When lines are parallel, they are <span>supplementary (add to 180°)</span>.',
    relation: 'supp',
    pairs: [['∠3','∠5'],['∠4','∠6']]
  }
};

// Angle positions: which sector each numbered angle is in
// At intersection T0 (top): angles 1-4
// At intersection T1 (bottom): angles 5-8
// Sector order: top-right=1, top-left=2, bottom-left=3, bottom-right=4 (same at T1: 5,6,7,8)
// We'll map angle names to highlight sectors
const ANGLE_SECTORS = {
  '∠1':{t:0,s:'TR'}, '∠2':{t:0,s:'TL'}, '∠3':{t:0,s:'BL'}, '∠4':{t:0,s:'BR'},
  '∠5':{t:1,s:'TR'}, '∠6':{t:1,s:'TL'}, '∠7':{t:1,s:'BL'}, '∠8':{t:1,s:'BR'},
};

function setAngle(v){ angle = parseFloat(v); document.getElementById('angleVal').textContent = v+'°'; draw(); }
function toggleParallel(){
  isParallel = !isParallel;
  const tog = document.getElementById('parallelToggle');
  tog.classList.toggle('on', isParallel);
  draw();
}

function getGeometry() {
  const W = 720, H = 400;
  const L1y = 140, L2y = 280;
  const Tx = 260;
  const rad = angle * Math.PI / 180;
  // Transversal intersects L1 at (Tx, L1y), continues to L2
  const slope = 1 / Math.tan(rad); // dx per dy on transversal
  const T0 = { x: Tx, y: L1y };
  const T1x = isParallel ? Tx + slope * (L2y - L1y) : Tx + slope * (L2y - L1y) * 0.85;
  const T1 = { x: T1x, y: L2y };
  return { W, H, L1y, L2y, T0, T1, rad };
}

function draw() {
  const { W, H, L1y, L2y, T0, T1, rad } = getGeometry();
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0d1b2e';
  ctx.fillRect(0, 0, W, H);

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,.04)';
  for(let x=40;x<W;x+=40) for(let y=30;y<H;y+=40) { ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill(); }

  // Draw highlighted angle sectors first (behind lines)
  if (activeCat) {
    const info = CAT_INFO[activeCat];
    const pairs = info.pairs;
    const currentPair = pairs[pairIndex];
    const col = CAT_COLORS[activeCat];
    currentPair.forEach(ang => drawAngleSector(ang, col, T0, T1, rad));
  }

  // Parallel lines
  const lineExt = 240;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  // L1
  const isHighL1 = activeCat && (CAT_INFO[activeCat]?.pairs[pairIndex].some(a => parseInt(a.replace('∠','')) <= 4));
  ctx.strokeStyle = isHighL1 ? '#4a9eff' : 'rgba(74,158,255,.55)';
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(T0.x - lineExt, L1y); ctx.lineTo(T0.x + lineExt, L1y); ctx.stroke();

  // Parallel marker on L1
  if (isParallel) drawParallelMarkers(ctx, T0.x - 80, L1y, 1);

  // L2
  const isHighL2 = activeCat && (CAT_INFO[activeCat]?.pairs[pairIndex].some(a => parseInt(a.replace('∠','')) > 4));
  ctx.strokeStyle = isHighL2 ? '#4a9eff' : 'rgba(74,158,255,.55)';
  const L2startX = isParallel ? T1.x - lineExt : T1.x - lineExt * 0.85;
  const L2endX = isParallel ? T1.x + lineExt : T1.x + lineExt * 1.1;
  ctx.beginPath(); ctx.moveTo(L2startX, L2y); ctx.lineTo(L2endX, L2y); ctx.stroke();

  if (isParallel) drawParallelMarkers(ctx, T1.x - 80, L2y, 1);

  // NOT parallel indicator
  if (!isParallel) {
    ctx.strokeStyle = 'rgba(255,107,107,.5)';
    ctx.lineWidth = 2; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(T1.x + lineExt, L2y); ctx.lineTo(T0.x + lineExt + 60, L1y); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Transversal
  const transExt = 100;
  const dx = Math.cos(Math.PI/2 - rad), dy = Math.sin(Math.PI/2 - rad);
  ctx.strokeStyle = '#ff9f43';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(T0.x - dx * transExt, T0.y - dy * transExt);
  ctx.lineTo(T1.x + dx * (transExt + (isParallel?0:20)), T1.y + dy * (transExt + 20));
  ctx.stroke();

  // Draw angle arcs at intersections
  drawAngleArcs(T0, rad, 0, '#4a9eff');
  drawAngleArcs(T1, rad, 4, '#4a9eff');

  // Angle labels
  drawAngleLabels(T0, rad, 0);
  drawAngleLabels(T1, rad, 4);

  // Line labels
  ctx.fillStyle = 'rgba(74,158,255,.7)';
  ctx.font = 'bold 13px Nunito,sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('L₁', T0.x + lineExt + 8, L1y + 5);
  ctx.fillText('L₂', (isParallel ? T1.x : T1.x * 1.05) + lineExt + 8, L2y + 5);

  ctx.fillStyle = 'rgba(255,159,67,.7)';
  ctx.fillText('t', T0.x - dx * (transExt + 14) - 8, T0.y - dy * (transExt + 14));

  updateAngleRef();
  updateInfoCard();
}

function drawParallelMarkers(ctx, x, y, n) {
  ctx.strokeStyle = 'rgba(74,158,255,.5)';
  ctx.lineWidth = 2;
  const size = 7;
  for(let i=0;i<n;i++){
    const ox = i * 7 - (n-1)*3.5;
    ctx.beginPath();
    ctx.moveTo(x + ox - size/2, y - size/2);
    ctx.lineTo(x + ox + size/2, y);
    ctx.lineTo(x + ox - size/2, y + size/2);
    ctx.stroke();
  }
}

function drawAngleSector(angName, color, T0, T1, rad) {
  const info = ANGLE_SECTORS[angName];
  if (!info) return;
  const center = info.t === 0 ? T0 : T1;
  const sector = info.s;
  const r = 52;

  // Determine start/end angles for each sector
  // Lines: horizontal (0/π) and transversal at rad from vertical
  const transAngle = Math.PI/2 - rad; // angle of transversal from horizontal
  let a1, a2;
  if      (sector==='TR'){ a1 = -transAngle;     a2 = 0; }
  else if (sector==='TL'){ a1 = Math.PI;          a2 = Math.PI + transAngle; }
  else if (sector==='BL'){ a1 = Math.PI + transAngle; a2 = Math.PI*2; }
  else                   { a1 = 0;                a2 = Math.PI - transAngle; }

  // Flip for bottom intersection (transversal direction reversed)
  if (info.t === 1) {
    const flip = (a) => Math.PI - a;
    [a1,a2] = [flip(a2), flip(a1)];
    // Normalize
    while(a1 < 0) a1 += Math.PI*2;
    while(a2 < 0) a2 += Math.PI*2;
  }

  ctx.beginPath();
  ctx.moveTo(center.x, center.y);
  ctx.arc(center.x, center.y, r, a1, a2);
  ctx.closePath();
  ctx.fillStyle = color + '35';
  ctx.fill();
  ctx.strokeStyle = color + '80';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawAngleArcs(center, rad, offset, color) {
  // Just small arc indicators at each intersection
  const r = 18;
  const transAngle = Math.PI/2 - rad;
  // Four sectors
  const sectors = [
    [-transAngle, 0],
    [Math.PI, Math.PI + transAngle],
    [Math.PI + transAngle, Math.PI*2],
    [0, Math.PI - transAngle],
  ];
  sectors.forEach(([a1, a2]) => {
    ctx.beginPath();
    ctx.arc(center.x, center.y, r, a1, a2);
    ctx.strokeStyle = 'rgba(255,255,255,.12)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });
}

function drawAngleLabels(center, rad, numOffset) {
  const r = 38;
  const transAngle = Math.PI/2 - rad;
  // Mid-angles for label placement
  const mids = [
    -transAngle / 2,
    Math.PI + transAngle / 2,
    Math.PI + transAngle + (Math.PI - transAngle)/2,
    transAngle/2 + (Math.PI - transAngle)/2,
  ];
  const labels = numOffset === 0 ? ['1','2','3','4'] : ['5','6','7','8'];

  ctx.font = 'bold 12px Nunito,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  mids.forEach((mid, i) => {
    const lx = center.x + Math.cos(mid) * r;
    const ly = center.y + Math.sin(mid) * r;
    const angName = '∠' + labels[i];
    const isHighlighted = activeCat && CAT_INFO[activeCat].pairs[pairIndex].includes(angName);
    ctx.fillStyle = isHighlighted ? '#fff' : 'rgba(255,255,255,.45)';
    ctx.font = isHighlighted ? 'bold 13px Nunito,sans-serif' : '11px Nunito,sans-serif';
    ctx.fillText(labels[i], lx, ly);
  });
}

function updateAngleRef() {
  const refGrid = document.getElementById('ref-grid');
  const colors = ['#c084fc','#c084fc','#4a9eff','#4a9eff','#00d4aa','#00d4aa','#ffb347','#ffb347'];
  refGrid.innerHTML = [1,2,3,4,5,6,7,8].map((n,i) => {
    const angName = '∠'+n;
    const isHigh = activeCat && CAT_INFO[activeCat].pairs[pairIndex].includes(angName);
    const loc = n<=4 ? 'Top ∩' : 'Bottom ∩';
    return `<div class="ref-item" style="${isHigh?'color:var(--text);font-weight:900':''}">
      <div class="ref-dot" style="background:${colors[i]}${isHigh?'':'60'}">∠${n}</div>
      ${loc}
    </div>`;
  }).join('');
}

function selectCat(cat) {
  activeCat = cat;
  pairIndex = 0;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-'+cat);
  if(btn){ btn.classList.add('active'); btn.style.background = CAT_COLORS[cat]+'22'; btn.style.borderColor = CAT_COLORS[cat]; btn.style.color = CAT_COLORS[cat]; }
  updateNavDots();
  draw();
}

function clearCat() {
  activeCat = null; pairIndex = 0;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = ''; b.style.borderColor = ''; b.style.color = '';
  });
  document.getElementById('nav-area').style.display = 'none';
  draw();
}

function updateNavDots() {
  if (!activeCat) { document.getElementById('nav-area').style.display='none'; return; }
  const pairs = CAT_INFO[activeCat].pairs;
  document.getElementById('nav-area').style.display = 'block';
  document.getElementById('nav-dots').innerHTML = pairs.map((_, i) =>
    `<div class="ndot ${i===pairIndex?'active':''}" onclick="goToPair(${i})"></div>`
  ).join('');
}

function goToPair(i) { pairIndex = i; updateNavDots(); draw(); }
function nextPair() { if(!activeCat) return; pairIndex = (pairIndex+1) % CAT_INFO[activeCat].pairs.length; updateNavDots(); draw(); }
function prevPair() { if(!activeCat) return; pairIndex = (pairIndex - 1 + CAT_INFO[activeCat].pairs.length) % CAT_INFO[activeCat].pairs.length; updateNavDots(); draw(); }

function updateInfoCard() {
  if (!activeCat) {
    document.getElementById('info-type').textContent = 'Select a category';
    document.getElementById('info-pair').textContent = '—';
    document.getElementById('info-rule').innerHTML = 'Click any angle pair category to highlight and explore that relationship on the diagram.';
    document.getElementById('info-card').style.borderColor = 'var(--border)';
    return;
  }
  const info = CAT_INFO[activeCat];
  const pair = info.pairs[pairIndex];
  const col = CAT_COLORS[activeCat];
  const angDeg = angle;
  const suppDeg = 180 - angle;
  const pairText = pair[0] + ' and ' + pair[1];
  const valText = info.relation === 'equal' ? `both = ${angDeg}°` : `${angDeg}° + ${suppDeg}° = 180°`;
  document.getElementById('info-type').textContent = info.name;
  document.getElementById('info-pair').innerHTML = `<span style="color:${col}">${pairText}</span> — ${isParallel ? valText : '(not parallel)'}`;
  document.getElementById('info-rule').innerHTML = info.rule;
  document.getElementById('info-card').style.borderColor = col;
  // relation badge
  let badge = document.querySelector('.info-relation');
  if(badge) badge.remove();
  badge = document.createElement('div');
  badge.className = `info-relation ${info.relation === 'equal' ? 'rel-equal' : 'rel-supp'}`;
  badge.textContent = info.relation === 'equal' ? '✓ Always equal when lines are parallel' : '✓ Sum to 180° when lines are parallel';
  document.getElementById('info-card').appendChild(badge);
}

draw();
</script>
</body>
</html>
