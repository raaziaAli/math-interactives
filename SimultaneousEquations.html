  <style>

      font-family: Arial, sans-serif;

      max-width: 700px;

  <style>
  /* =====================================================
     Mrs. Ali's Classroom — Universal Mobile Fixes
     ===================================================== */

  /* Prevent horizontal page scrolling at all costs */
  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }

  /* Make ALL images, SVGs, canvases, iframes fit their container */
  img, svg, canvas, video, iframe {
    max-width: 100%;
    height: auto;
  }

  /* Canvases inside interactive tools sometimes have fixed pixel width.
     Force them to respond to their parent. */
  canvas {
    max-width: 100% !important;
    height: auto;
  }

  /* Wrap any <table> in an auto-scroll container.
     The table itself scrolls inside that box, not the whole page.
     This fixes "table overlaps other content when scrolling". */
  @media (max-width: 768px) {
    table {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
      max-width: 100%;
    }
    table thead, table tbody, table tr {
      display: table;
      width: 100%;
      table-layout: fixed;
    }
    /* Let inputs inside tables breathe a little */
    table input[type="text"],
    table input[type="number"] {
      width: 100% !important;
      min-width: 60px;
      box-sizing: border-box;
    }
  }

  /* Enlarge tap targets on phones */
  @media (max-width: 768px) {
    button,
    input[type="button"],
    input[type="submit"],
    input[type="reset"],
    .btn, .hbtn, .pw-btn, .go-btn {
      min-height: 44px;
      padding: 10px 16px !important;
      font-size: 15px !important;
    }

    /* Text inputs should be big enough to tap */
    input[type="text"],
    input[type="number"],
    input[type="email"],
    input[type="password"],
    select,
    textarea {
      min-height: 40px;
      font-size: 16px !important; /* prevents iOS from zooming on focus */
      padding: 8px 10px;
    }
  }

  /* Sliders: make them fill available width */
  @media (max-width: 768px) {
    input[type="range"] {
      width: 100% !important;
      max-width: 100%;
      min-height: 44px; /* bigger thumb area to tap */
    }
  }

  /* When there are multiple buttons in a row, stack them on narrow screens */
  @media (max-width: 520px) {
    .actions,
    .controls,
    .button-row,
    .btn-row,
    .hero-cta {
      flex-direction: column;
      align-items: stretch;
    }
    .actions button,
    .controls button,
    .button-row button,
    .btn-row button,
    .hero-cta a,
    .hero-cta button {
      width: 100%;
      margin-left: 0 !important;
    }
  }

  /* Prevent oversized fixed-width sections from overflowing */
  @media (max-width: 768px) {
    .wrap,
    .container,
    .content-wrap,
    main,
    section {
      max-width: 100%;
      padding-left: 14px;
      padding-right: 14px;
      box-sizing: border-box;
    }
    /* Don't double-pad nested elements */
    main .wrap, section .container {
      padding-left: 0;
      padding-right: 0;
    }
  }

  /* Make large headings scale down on small screens */
  @media (max-width: 520px) {
    h1 { font-size: 1.5rem !important; line-height: 1.15; }
    h2 { font-size: 1.25rem !important; line-height: 1.2; }
    h3 { font-size: 1.1rem !important; }
    header h1 { font-size: 1.2rem !important; }
  }

  /* Grid layouts: collapse multi-column grids to single column */
  @media (max-width: 768px) {
    .row,
    .grid,
    .two-col,
    .three-col,
    .top-layout,
    .charts-row,
    .games-grid,
    .paths-grid,
    .tools-grid,
    .trust-grid,
    .try-grid,
    .audience-tabs {
      grid-template-columns: 1fr !important;
      display: grid;
      gap: 14px;
    }
  }

  /* Fix common "card" patterns that have fixed widths */
  @media (max-width: 768px) {
    .card,
    .kpi,
    .chart-card,
    .tool-card,
    .game-card,
    .try-card {
      max-width: 100%;
      box-sizing: border-box;
    }
  }

  /* Better scroll behavior on touch */
  @media (max-width: 768px) {
    body {
      -webkit-overflow-scrolling: touch;
    }
  }

  /* Any element that explicitly sets a fixed width beyond the screen —
     gently cap it */
  @media (max-width: 500px) {
    [style*="width:"],
    [style*="width ="] {
      max-width: 100%;
    }
  }
</style>
</head>
<body>
  <nav class="mac-topnav" role="navigation" aria-label="Main navigation">
  <a href="https://raaziaali.github.io/" class="mac-home-btn" aria-label="Back to Mrs. Ali's Classroom home">
    <svg class="mac-home-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    <span class="mac-home-text">Mrs. Ali's Classroom</span>
  </a>
</nav>

<style>
  .mac-topnav {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    z-index: 99999;
    padding: 10px 16px;
    background: rgba(10, 10, 31, 0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(196, 181, 253, 0.2);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "DM Sans", sans-serif;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    box-sizing: border-box;
    margin: 0;
  }
  .mac-home-btn {
    display: inline-flex !important;
    align-items: center;
    gap: 8px;
    color: #F8F9FF !important;
    text-decoration: none !important;
    font-size: 14px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 8px;
    transition: background 0.2s, transform 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
    border: none;
    background: transparent;
  }
  .mac-home-btn:hover,
  .mac-home-btn:focus {
    background: rgba(0, 229, 255, 0.12) !important;
    color: #00E5FF !important;
    outline: none;
  }
  .mac-home-btn:active {
    transform: translateX(-2px);
  }
  .mac-home-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .mac-home-text { white-space: nowrap; }
  @media (max-width: 500px) {
    .mac-topnav { padding: 8px 12px; }
    .mac-home-text { font-size: 13px; }
  }
  .mac-topnav, .mac-topnav * { box-sizing: border-box; }
  [data-mac-legacy-hidden="true"] { display: none !important; }
</style>

<script>
  (function() {
    function hideLegacyBackLinks() {
      var patterns = [
        /^\s*(\u2190|<-|\u2039|\u00ab|\u2039\u2039|\u2190+|<+)\s*back/i,
        /^\s*back\s+to\b/i,
        /^\s*back\s*(home|$)/i,
        /^\s*home\s*$/i,
        /portal\s*$/i,
        /back\s+to\s+portal/i,
        /back\s+to\s+home/i,
        /return\s+to/i,
        /all\s+tools/i
      ];
      var links = document.querySelectorAll('a, button');
      for (var i = 0; i < links.length; i++) {
        var el = links[i];
        if (el.classList.contains('mac-home-btn')) continue;
        if (el.closest && el.closest('.mac-topnav')) continue;
        var text = (el.textContent || '').trim();
        if (!text) continue;
        for (var j = 0; j < patterns.length; j++) {
          if (patterns[j].test(text)) {
            el.setAttribute('data-mac-legacy-hidden', 'true');
            break;
          }
        }
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', hideLegacyBackLinks);
    } else {
      hideLegacyBackLinks();
    }
  })();
</script>
  <h2>Graphing Simultaneous Equations </h2>

  <div>
    <label>Equation 1 (Standard form - ax + by = c): <input type="text" id="eq1" value="2x+3y=6" /></label><br />
    <label>Equation 2 (Standard form - ax + by = c): <input type="text" id="eq2" value="-1x+1y=4" /></label><br />
    <button onclick="plotGraph()">Plot Graph</button>
  </div>

  <canvas id="graph" width="700" height="500"></canvas>
  <div id="details"></div>

  <script>
    let chart;

    function parseEquation(eq) {
      eq = eq.replace(/\s/g, '');
      const match = eq.match(/^([+-]?\d*\.?\d*)x([+-]?\d*\.?\d*)y=([+-]?\d*\.?\d*)$/i);
      if (!match) return null;

      let a = match[1] ? parseFloat(match[1].replace('x', '') || '1') : 0;
      let b = match[2] ? parseFloat(match[2].replace('y', '') || '1') : 0;
      let c = parseFloat(match[3]);

      return { a, b, c };
    }

    function standardToSlope(a, b, c) {
      return {
        m: -a / b,
        b: c / b
      };
    }

    function findIntersection(l1, l2) {
      const x = (l2.b - l1.b) / (l1.m - l2.m);
      const y = l1.m * x + l1.b;
      return { x, y };
    }

    function plotGraph() {
      const eq1 = parseEquation(document.getElementById('eq1').value);
      const eq2 = parseEquation(document.getElementById('eq2').value);

      if (!eq1 || !eq2 || eq1.b === 0 || eq2.b === 0 || (eq1.a === eq2.a && eq1.b === eq2.b)) {
        alert('Invalid input or parallel lines. Use format: ax + by = c');
        return;
      }

      const l1 = standardToSlope(eq1.a, eq1.b, eq1.c);
      const l2 = standardToSlope(eq2.a, eq2.b, eq2.c);

      const xVals = Array.from({ length: 41 }, (_, i) => i - 20);
      const y1 = xVals.map(x => l1.m * x + l1.b);
      const y2 = xVals.map(x => l2.m * x + l2.b);

      const yAxisVals = Array.from({ length: 41 }, (_, i) => i - 20);
      const axisX = xVals.map(x => ({ x: x, y: 0 }));
      const axisY = yAxisVals.map(y => ({ x: 0, y: y }));

      if (chart) chart.destroy();
      chart = new Chart(document.getElementById('graph'), {
        type: 'line',
        data: {
          datasets: [
            {
              label: `Line 1: y = ${l1.m.toFixed(2)}x + ${l1.b.toFixed(2)}`,
              data: xVals.map((x, i) => ({ x, y: y1[i] })),
              borderColor: 'blue',
              borderWidth: 2,
              fill: false
            },
            {
              label: `Line 2: y = ${l2.m.toFixed(2)}x + ${l2.b.toFixed(2)}`,
              data: xVals.map((x, i) => ({ x, y: y2[i] })),
              borderColor: 'red',
              borderWidth: 2,
              fill: false
            },
            {
              label: `Intersection (${findIntersection(l1, l2).x.toFixed(2)}, ${findIntersection(l1, l2).y.toFixed(2)})`,
              data: [{ x: findIntersection(l1, l2).x, y: findIntersection(l1, l2).y }],
              backgroundColor: 'green',
              pointRadius: 6,
              showLine: false,
              type: 'scatter'
            },
            {
              label: false,
              data: axisX,
              borderColor: 'black',
              borderWidth: 3,
              fill: false,
              pointRadius: 0
            },
            {
              label: false,
              data: axisY,
              borderColor: 'black',
              borderWidth: 3,
              fill: false,
              pointRadius: 0
            }
          ]
        },
        options: {
          interaction: {
            mode: 'nearest',
            axis: 'xy',
            intersect: true
          },
          plugins: {
            tooltip: {
              callbacks: {
                label: function(context) {
                  const pt = context.parsed;
                  return `(${pt.x.toFixed(2)}, ${pt.y.toFixed(2)})`;
                }
              }
            },
            legend: {
              labels: {
                usePointStyle: true,
                filter: item => item.text !== false
              }
            }
          },
          scales: {
            x: {
              type: 'linear',
              min: -20,
              max: 20,
              title: {
                display: true,
                text: 'x-axis'
              },
              grid: {
                color: '#ccc',
                lineWidth: 1
              },
              ticks: {
                stepSize: 1
              }
            },
            y: {
              min: -20,
              max: 20,
              title: {
                display: true,
                text: 'y-axis'
              },
              grid: {
                color: '#ccc',
                lineWidth: 1
              },
              ticks: {
                stepSize: 1
              }
            }
          }
        }
      });

      const intersection = findIntersection(l1, l2);
      document.getElementById("details").innerHTML = `
        <p><strong>Line 1:</strong> y = ${l1.m.toFixed(2)}x + ${l1.b.toFixed(2)}</p>
        <p><strong>Line 2:</strong> y = ${l2.m.toFixed(2)}x + ${l2.b.toFixed(2)}</p>
        <p><strong>Intersection:</strong> (${intersection.x.toFixed(2)}, ${intersection.y.toFixed(2)})</p>
      `;
    }

    plotGraph();
  </script>
</body>
</html>
