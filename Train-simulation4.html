<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>Train Speed vs. Air Resistance</title>  <style>    body {      font-family: Arial, sans-serif;      background: #f4f4f4;      text-align: center;      padding: 20px;    }    canvas {      background: #fff;      border: 1px solid #ccc;      margin-top: 20px;    }    .controls {      margin: 15px 0;    }    .description {      max-width: 900px;      margin: auto;      text-align: left;      background: #ffffff;      padding: 15px;      border-radius: 8px;      box-shadow: 0 0 10px rgba(0,0,0,0.1);    }    label {      font-weight: bold;    }  </style></head><body>  <h1>Bullet vs. Regular Train: Speed & Air Resistance</h1>  <div class="description">    <p>This simulation visually compares how speed affects air resistance and motion for bullet and regular trains. Bullet trains are more aerodynamic and move faster with less drag.</p>  </div>  <div class="controls">    <label for="speed">Adjust Train Speed (km/h): <span id="speedDisplay">250</span></label><br>    <input type="range" id="speed" min="160" max="350" value="250" />  </div>  <canvas id="simulation" width="1000" height="400"></canvas>  <script>    const canvas = document.getElementById("simulation");    const ctx = canvas.getContext("2d");    let speed = 250;    const bulletDragCoef = 0.03;    const regularDragCoef = 0.08;    let bulletX = 0;    let regularX = 0;    document.getElementById("speed").addEventListener("input", (e) => {      speed = parseInt(e.target.value);      document.getElementById("speedDisplay").innerText = speed;    });    function drawTrain(x, y, type) {      ctx.fillStyle = type === 'bullet' ? '#3a6ea5' : '#a53a3a';      if (type === 'bullet') {        ctx.beginPath();        ctx.moveTo(x, y);        ctx.lineTo(x + 120, y);        ctx.lineTo(x + 140, y + 25);        ctx.lineTo(x + 120, y + 50);        ctx.lineTo(x, y + 50);        ctx.closePath();        ctx.fill();      } else {        ctx.fillRect(x, y, 140, 50);      }      ctx.fillStyle = '#000';      ctx.font = '14px Arial';      ctx.fillText(type === 'bullet' ? 'Bullet Train' : 'Regular Train', x + 20, y - 10);    }    function drawAirResistance(x, y, label, dragCoef, color) {      const resistance = Math.round(dragCoef * speed * speed / 100);      ctx.strokeStyle = color;      ctx.lineWidth = 5;      ctx.beginPath();      ctx.moveTo(x + 140, y + 25);      ctx.lineTo(x + 140 + resistance, y + 25);      ctx.stroke();      ctx.fillStyle = color;      ctx.font = '14px Arial';      ctx.fillText(`${label} Resistance: ${resistance}`, x + 150 + resistance, y + 20);    }    function updatePositions() {      const bulletSpeed = (speed / 10) * (1 - bulletDragCoef);      const regularSpeed = (speed / 10) * (1 - regularDragCoef);      bulletX += bulletSpeed * 0.1;      regularX += regularSpeed * 0.1;      if (bulletX > canvas.width) bulletX = -150;      if (regularX > canvas.width) regularX = -150;    }    function draw() {      ctx.clearRect(0, 0, canvas.width, canvas.height);      updatePositions();      drawTrain(bulletX, 100, 'bullet');      drawTrain(regularX, 250, 'regular');      drawAirResistance(bulletX, 100, 'Bullet Train', bulletDragCoef, 'blue');      drawAirResistance(regularX, 250, 'Regular Train', regularDragCoef, 'red');    }    function animate() {      draw();      requestAnimationFrame(animate);    }    animate();  </script></body></html>
