
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Volume Calculator with Canvas</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      text-align: center;
      padding: 2rem;
    }
    .container {
      background: white;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }
    canvas {
      margin: 1rem auto;
      background: #fff;
      display: block;
      border: 1px solid #ccc;
    }
    .input-group {
      margin: 1rem 0;
      text-align: left;
    }
    input[type=range] {
      width: 100%;
    }
  </style>
</head>
<body>
  <nav class="mac-topnav" role="navigation" aria-label="Main navigation">
  <a href="https://raaziaali.github.io/" class="mac-home-btn" aria-label="Back to Mrs. Ali's Classroom home">
    <svg class="mac-home-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    <span class="mac-home-text">Mrs. Ali's Classroom</span>
  </a>
</nav>

<style>
  .mac-topnav {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    z-index: 99999;
    padding: 10px 16px;
    background: rgba(10, 10, 31, 0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(196, 181, 253, 0.2);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "DM Sans", sans-serif;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    box-sizing: border-box;
    margin: 0;
  }
  .mac-home-btn {
    display: inline-flex !important;
    align-items: center;
    gap: 8px;
    color: #F8F9FF !important;
    text-decoration: none !important;
    font-size: 14px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 8px;
    transition: background 0.2s, transform 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
    border: none;
    background: transparent;
  }
  .mac-home-btn:hover,
  .mac-home-btn:focus {
    background: rgba(0, 229, 255, 0.12) !important;
    color: #00E5FF !important;
    outline: none;
  }
  .mac-home-btn:active {
    transform: translateX(-2px);
  }
  .mac-home-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .mac-home-text { white-space: nowrap; }
  @media (max-width: 500px) {
    .mac-topnav { padding: 8px 12px; }
    .mac-home-text { font-size: 13px; }
  }
  .mac-topnav, .mac-topnav * { box-sizing: border-box; }
  [data-mac-legacy-hidden="true"] { display: none !important; }
</style>

<script>
  (function() {
    function hideLegacyBackLinks() {
      var patterns = [
        /^\s*(\u2190|<-|\u2039|\u00ab|\u2039\u2039|\u2190+|<+)\s*back/i,
        /^\s*back\s+to\b/i,
        /^\s*back\s*(home|$)/i,
        /^\s*home\s*$/i,
        /portal\s*$/i,
        /back\s+to\s+portal/i,
        /back\s+to\s+home/i,
        /return\s+to/i,
        /all\s+tools/i
      ];
      var links = document.querySelectorAll('a, button');
      for (var i = 0; i < links.length; i++) {
        var el = links[i];
        if (el.classList.contains('mac-home-btn')) continue;
        if (el.closest && el.closest('.mac-topnav')) continue;
        var text = (el.textContent || '').trim();
        if (!text) continue;
        for (var j = 0; j < patterns.length; j++) {
          if (patterns[j].test(text)) {
            el.setAttribute('data-mac-legacy-hidden', 'true');
            break;
          }
        }
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', hideLegacyBackLinks);
    } else {
      hideLegacyBackLinks();
    }
  })();
</script>
  <div class="container">
    <h2>Volume Calculator</h2>
    <select id="shape" onchange="updateUI()">
      <option value="sphere">Sphere</option>
      <option value="cylinder">Cylinder</option>
      <option value="cone">Cone</option>
    </select>

    <canvas id="shapeCanvas" width="200" height="160"></canvas>

    <p id="formula">Formula appears here</p>

    <div class="input-group">
      <label>Radius: <span id="radiusVal">5</span></label>
      <input type="range" id="radius" min="1" max="50" value="5" step="0.1" oninput="updateVolume()">
    </div>

    <div class="input-group" id="heightGroup">
      <label>Height: <span id="heightVal">10</span></label>
      <input type="range" id="height" min="1" max="100" value="10" step="0.1" oninput="updateVolume()">
    </div>

    <div><strong id="result">Volume = ...</strong></div>
  </div>

  <script>
    function updateUI() {
      const shape = document.getElementById('shape').value;
      const formula = document.getElementById('formula');
      const heightGroup = document.getElementById('heightGroup');

      if (shape === 'sphere') {
        formula.textContent = 'Formula: V = (4/3)πr³';
        heightGroup.style.display = 'none';
      } else if (shape === 'cylinder') {
        formula.textContent = 'Formula: V = πr²h';
        heightGroup.style.display = 'block';
      } else if (shape === 'cone') {
        formula.textContent = 'Formula: V = (1/3)πr²h';
        heightGroup.style.display = 'block';
      }

      updateVolume();
    }

    function updateVolume() {
      const shape = document.getElementById('shape').value;
      const r = parseFloat(document.getElementById('radius').value);
      const h = parseFloat(document.getElementById('height').value);
      const π = Math.PI;

      document.getElementById('radiusVal').innerText = r;
      document.getElementById('heightVal').innerText = h;

      let volume = 0;

      if (shape === 'sphere') {
        volume = (4 / 3) * π * Math.pow(r, 3);
      } else if (shape === 'cylinder') {
        volume = π * Math.pow(r, 2) * h;
      } else if (shape === 'cone') {
        volume = (1 / 3) * π * Math.pow(r, 2) * h;
      }

      document.getElementById('result').textContent = `Volume = ${volume.toFixed(2)} units³`;

      drawShape(shape, r, h);
    }

    function drawShape(shape, r, h) {
      const canvas = document.getElementById('shapeCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = '#0074D9';
      ctx.lineWidth = 2;
      ctx.font = '12px Arial';
      ctx.fillStyle = '#333';
      ctx.textAlign = 'center';

      if (shape === 'sphere') {
        ctx.beginPath();
        ctx.arc(100, 75, 50, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillText(`r = ${r}`, 100, 75);
      } else if (shape === 'cylinder') {
        ctx.beginPath();
        ctx.ellipse(100, 40, 40, 10, 0, 0, Math.PI * 2);
        ctx.moveTo(60, 40);
        ctx.lineTo(60, 110);
        ctx.moveTo(140, 40);
        ctx.lineTo(140, 110);
        ctx.ellipse(100, 110, 40, 10, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillText(`r = ${r}`, 100, 20);
        ctx.fillText(`h = ${h}`, 150, 75);
      } else if (shape === 'cone') {
        ctx.beginPath();
        ctx.moveTo(60, 110);
        ctx.lineTo(100, 30);
        ctx.lineTo(140, 110);
        ctx.moveTo(60, 110);
        ctx.quadraticCurveTo(100, 130, 140, 110);
        ctx.stroke();
        ctx.fillText(`r = ${r}`, 100, 130);
        ctx.fillText(`h = ${h}`, 150, 75);
      }
    }

    window.onload = updateUI;
  </script>
</body>
</html>
